<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scheduling — Karbon</title>
<template id="__bundler_thumbnail" data-bg-color="#c1632f">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect x="430" y="250" width="340" height="300" rx="40" fill="#fffdfa"/>
    <rect x="480" y="320" width="240" height="26" rx="13" fill="#efe0d2"/>
    <rect x="480" y="378" width="180" height="26" rx="13" fill="#f0d8c8"/>
    <rect x="480" y="436" width="210" height="26" rx="13" fill="#e8e1d4"/>
    <circle cx="715" cy="455" r="34" fill="#c1632f"/>
    <text x="715" y="470" font-family="sans-serif" font-size="38" font-weight="800" fill="#fffdfa" text-anchor="middle">S</text>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     KARBON SCHEDULING DASHBOARD — standalone index.html
     Vanilla JS. No framework. Save as index.html, push to Vercel.
     Reads /api/tasks on load and POSTs nothing — it just renders.
     "Send report now" calls /api/weekly with a Bearer header.
     ============================================================ */
  *{ box-sizing:border-box; }
  body{ margin:0; background:#f6f2ea; font-family:'Hanken Grotesk',system-ui,sans-serif; color:#29251f; }
  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-thumb{ background:#d8d0c0; border-radius:8px; }
  .mono{ font-family:'JetBrains Mono',monospace; }
  .wrap{ min-height:100vh; padding:24px 16px 64px; }
  .col{ max-width:820px; margin:0 auto; }

  .head{ display:flex; align-items:center; justify-content:space-between; gap:14px; padding:16px 20px; background:#fffdfa; border:1px solid #e8e1d4; border-radius:14px 14px 0 0; flex-wrap:wrap; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .logo{ width:32px; height:32px; border-radius:9px; background:#c1632f; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:16px; }
  .brand-name{ font-weight:700; font-size:15px; line-height:1; }
  .brand-sub{ font-size:11px; color:#9a8f7f; margin-top:3px; display:flex; align-items:center; gap:5px; }
  .dot{ width:6px; height:6px; border-radius:50%; display:inline-block; }

  .conn{ padding:10px 20px; background:#fffdfa; border-left:1px solid #e8e1d4; border-right:1px solid #e8e1d4; border-bottom:1px solid #e8e1d4; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .conn-left{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:#7c7468; }

  .btn{ font-family:inherit; border-radius:8px; cursor:pointer; font-size:12.5px; }
  .btn-primary{ padding:6px 14px; font-weight:600; color:#fff; background:#c1632f; border:none; }
  .btn-ghost{ padding:6px 14px; font-weight:600; color:#c1632f; background:#fff; border:1px solid #e0cdbc; }

  .tabs{ display:flex; gap:0; padding:0 20px; background:#fffdfa; border:1px solid #e8e1d4; border-top:none; flex-wrap:wrap; }
  .tab{ padding:14px 4px; margin-right:24px; font-size:13.5px; cursor:pointer; font-weight:500; color:#9a8f7f; border-bottom:2px solid transparent; }
  .tab.active{ font-weight:600; color:#29251f; border-bottom:2px solid #c1632f; }

  .panel{ background:#fffdfa; border:1px solid #e8e1d4; border-top:none; border-radius:0 0 14px 14px; padding:6px 20px 22px; }

  .cards{ display:flex; gap:12px; padding:18px 0 6px; flex-wrap:wrap; }
  .card{ flex:1; min-width:150px; background:#f9f5ee; border:1px solid #efe6d6; border-radius:10px; padding:14px 16px; }
  .card-label{ font-size:12px; color:#9a8f7f; margin-bottom:6px; }
  .card-val{ display:flex; align-items:baseline; gap:8px; }
  .card-num{ font-size:26px; font-weight:700; }
  .card-unit{ font-size:12px; color:#9a8f7f; }

  .sec{ padding:16px 0 4px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
  .sec-tag{ font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-weight:600; }
  .sec-count{ font-size:11px; color:#b3a89a; }
  .sec-rule{ height:1px; flex:1; background:#e8e1d4; }
  .chev{ width:7px; height:7px; border-right:2px solid #b3a89a; border-bottom:2px solid #b3a89a; transform:rotate(45deg); transition:transform .15s; display:inline-block; margin-bottom:3px; }
  .chev.closed{ transform:rotate(-45deg); }

  .row{ margin:8px 0; background:#fffdfa; border:1px solid #e8e1d4; border-left:4px solid #ccc; border-radius:10px; padding:14px 16px; display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .row-main{ flex:1; min-width:200px; }
  .row-title{ display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
  .row-task{ font-weight:600; font-size:14.5px; }
  .row-client{ font-size:12px; color:#9a8f7f; }
  .row-note{ font-size:12.5px; color:#7c7468; line-height:1.5; }
  .row-right{ text-align:right; flex:none; }
  .badge{ display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; }
  .row-meta{ font-size:12px; color:#7c7468; margin-top:7px; }

  .empty{ padding:60px 24px 70px; text-align:center; }
  .empty-ico{ width:54px; height:54px; margin:0 auto 18px; border-radius:14px; background:#f0e6d6; display:flex; align-items:center; justify-content:center; }
  .empty-ring{ width:22px; height:22px; border:2.5px solid #c9a06b; border-radius:50%; display:inline-block; }
  .empty-title{ font-size:17px; font-weight:700; margin-bottom:8px; }
  .empty-sub{ font-size:13.5px; color:#9a8f7f; line-height:1.6; max-width:380px; margin:0 auto; }

  .wl-head{ padding:18px 0 8px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .wl-title{ font-size:15px; font-weight:700; }
  .wl-sub{ font-size:12px; color:#9a8f7f; }
  .wl-row{ display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid #efe6d6; flex-wrap:wrap; }
  .wl-ava{ width:38px; height:38px; border-radius:10px; background:#f0e6d6; color:#8a6a3f; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex:none; }
  .wl-main{ flex:1; min-width:160px; }
  .wl-name{ font-weight:600; font-size:14px; }
  .wl-bar{ height:6px; background:#efe6d6; border-radius:6px; margin-top:7px; overflow:hidden; max-width:280px; }
  .wl-fill{ height:100%; border-radius:6px; }
  .wl-stat{ text-align:right; flex:none; min-width:84px; }
  .wl-count{ font-size:14px; font-weight:600; }
  .wl-hours{ font-size:11px; color:#9a8f7f; margin-top:3px; }
  .wl-over{ flex:none; width:84px; text-align:right; }

  .rep-head{ padding:16px 0 14px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .pill{ font-size:11px; color:#9a8f7f; background:#f9f5ee; border:1px solid #efe6d6; padding:5px 10px; border-radius:20px; }
  .email{ border:1px solid #efe6d6; border-radius:12px; overflow:hidden; }
  .email-to{ padding:12px 22px; background:#f9f5ee; border-bottom:1px solid #efe6d6; }
  .email-band{ background:#c1632f; padding:22px 24px; color:#fff; }
  .email-stats{ display:flex; flex-wrap:wrap; border-bottom:1px solid #efe6d6; }
  .email-stat{ flex:1; min-width:120px; padding:14px 20px; border-right:1px solid #efe6d6; }
  .email-body{ padding:18px 24px 18px; }
  .email-foot{ padding:14px 24px; background:#f9f5ee; border-top:1px solid #efe6d6; font-size:11px; color:#9a8f7f; text-align:center; }
  .rep-sec{ padding:18px 0 8px; display:flex; align-items:center; gap:8px; }
  .rep-item{ border-left:3px solid #bd8a2c; padding:9px 0 9px 14px; margin-bottom:8px; }

  .toast{ margin:0 0 12px; padding:10px 14px; border-radius:10px; font-size:12.5px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .secret{ margin:0 0 12px; padding:13px 15px; background:#f9f5ee; border:1px solid #efe6d6; border-radius:10px; }
  .secret input{ flex:1; min-width:220px; padding:9px 12px; border:1px solid #e0d7c6; border-radius:8px; font-size:12.5px; font-family:'JetBrains Mono',monospace; background:#fff; color:#29251f; outline:none; }

  .foot{ text-align:center; font-size:11px; color:#b3a89a; margin-top:14px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="col">

    <!-- HEADER -->
    <div class="head">
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <div class="brand-name">Scheduling</div>
          <div class="brand-sub"><span class="dot" id="hdrDot"></span><span id="hdrText">Loading…</span></div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="mono" id="hdrDate" style="font-size:14px; font-weight:600;"></div>
        <div style="font-size:11px; color:#9a8f7f; margin-top:2px;" id="hdrTime"></div>
      </div>
    </div>

    <!-- CONNECTION BAR -->
    <div class="conn">
      <div class="conn-left"><span class="dot" id="connDot" style="width:8px;height:8px;"></span><span id="connText">Connecting…</span></div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost" id="btnRefresh" onclick="loadTasks()">Refresh</button>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs">
      <div class="tab" data-tab="today">Today</div>
      <div class="tab" data-tab="week">This Week</div>
      <div class="tab" data-tab="work">Workload</div>
      <div class="tab" data-tab="report">Report</div>
    </div>

    <!-- PANEL -->
    <div class="panel" id="panel"></div>

    <div class="foot mono">Read-only · auto-emailed to admin Mondays 8:00 AM MT</div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — edit these before you deploy
   ============================================================ */
const TASKS_URL  = '/api/tasks';     // GET — returns your work items
const WEEKLY_URL = '/api/weekly';    // GET — triggers the Monday email
const CRON_SECRET = 'longlivethequeenofengland12345678910!!!'; // <-- your CRON_SECRET

// Workload tab roster — only these colleagues are charted, in this order.
// Matched case-insensitively against each task's assignee name.
const COLLEAGUES = [
  'Kayla Dawe',
  'Daryn Gordon',
  'Angel Palomo',
  'Jareht Almaraz',
  'Nathalie Novak',
  'Carey Pearce',
  'Markus Vassell',
];

/* ============================================================
   STATE
   ============================================================ */
let TASKS = [];                 // normalized task objects
let CONN  = 'connecting';       // connecting | live | empty | error
const collapsed = {};           // section open/closed by key
let TAB = 'today';

/* ============================================================
   DATA — fetch /api/tasks and map to a clean shape
   ============================================================ */
function startOfToday(){ const d = new Date(); d.setHours(0,0,0,0); return d; }

function normalize(data){
  // Accept a bare array OR { tasks:[...] } / { workItems:[...] } / { items:[...] }
  const arr = Array.isArray(data) ? data : (data && (data.tasks || data.workItems || data.items)) || [];
  const today = startOfToday();
  return arr.map(it => {
    const id        = it.id ?? it.Id ?? it.taskId ?? '';
    const title     = it.title ?? it.task ?? it.Title ?? 'Untitled';
    const status    = it.status ?? it.Status ?? '';
    const client    = it.client ?? it.clientName ?? it.ClientName ?? '';
    const assignee  = (it.assignee ?? it.assigneeName ?? it.AssigneeName ?? '').trim();
    const loggedHours = Number(it.loggedHours ?? it.hours ?? it.LoggedHours ?? 0) || 0;
    const dueRaw    = it.dueDate ?? it.due ?? it.DueDate ?? null;
    const addedRaw  = it.added ?? it.createdDate ?? it.WorkCreatedDate ?? null;

    let off = null, dateLabel = '';
    if (dueRaw){
      // Karbon stores due dates as CALENDAR dates at UTC midnight, e.g.
      // "2026-06-26T00:00:00Z". Parsing that with new Date() and then snapping
      // to local midnight shifts it back a day in any timezone behind UTC
      // (Mountain Time), so work "due today" was being counted as 1 day overdue.
      // Parse the Y-M-D parts straight into a LOCAL date to avoid the shift.
      const m = String(dueRaw).match(/^(\d{4})-(\d{2})-(\d{2})/);
      const d = m ? new Date(+m[1], +m[2] - 1, +m[3]) : new Date(dueRaw);
      if (!isNaN(d)){
        d.setHours(0,0,0,0);
        off = Math.round((d - today)/86400000);
        dateLabel = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      } else {
        dateLabel = String(dueRaw);
      }
    }
    let addedOff = null, addedLabel = '';
    if (addedRaw){
      const m = String(addedRaw).match(/^(\d{4})-(\d{2})-(\d{2})/);
      const a = m ? new Date(+m[1], +m[2] - 1, +m[3]) : new Date(addedRaw);
      if (!isNaN(a)){ a.setHours(0,0,0,0); addedOff = Math.round((a - today)/86400000); addedLabel = a.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
    }
    return { id, title, status, client, assignee, loggedHours, off, dateLabel, addedOff, addedLabel };
  })
  // ACTIVE ONLY — never render completed / canceled / archived work, even if the
  // backend lets one through. The Workload tab additionally limits the people
  // shown to the COLLEAGUES roster (no clients, no former employees).
  .filter(t => !/complete|cancel|archiv|done|closed|deleted/i.test(t.status));
}

async function loadTasks(){
  setConn('connecting');
  try{
    // The relay is POST-only (it forwards the Karbon "Work" view payload).
    const r = await fetch(TASKS_URL, { method:'POST', headers:{ 'Content-Type':'application/json', 'Accept':'application/json' }, body:'{}', cache:'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    TASKS = normalize(data);
    setConn(TASKS.length ? 'live' : 'empty');   // [] is a valid, successful response
  }catch(err){
    console.error('Failed to load /api/tasks:', err);
    TASKS = [];
    setConn('error');
  }
  render();
}

/* ============================================================
   SEND REPORT — GET /api/weekly with the Bearer header
   ============================================================ */
async function sendReport(){
  const btn = document.getElementById('btnSend');
  if (btn){ btn.disabled = true; btn.textContent = 'Sending…'; }
  try{
    const r = await fetch(WEEKLY_URL, {
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + CRON_SECRET, 'Accept':'application/json' }
    });
    if (!r.ok){ const t = await r.text().catch(()=> ''); throw new Error('HTTP ' + r.status + (t ? ' — ' + t : '')); }
    alert('Report sent!');
  }catch(err){
    console.error('Failed to send weekly report:', err);
    alert('Could not send the report — see the console for details.');
  }finally{
    if (btn){ btn.disabled = false; btn.textContent = 'Send report now'; }
  }
}

/* ============================================================
   DERIVE — urgency tier, colors, labels
   ============================================================ */
const TIER = {
  high:{ b:'#c14733', bg:'#f6e2dc', fg:'#8f2f1f' },  // overdue / red
  med :{ b:'#bd8a2c', bg:'#f5ead0', fg:'#7d5c12' },  // due soon / yellow
  low :{ b:'#5f7d4f', bg:'#e6ecdf', fg:'#3f5636' }   // ample time / green
};
function decorate(t){
  const d = t.off;
  let tier, label;
  if (d == null){ tier='low'; label = t.dateLabel ? ('due ' + t.dateLabel) : 'no due date'; }
  else if (d < 0){ tier='high'; label = (-d) + 'd over'; }
  else if (d <= 1){ tier='med'; label = d === 0 ? 'due today' : 'due tomorrow'; }
  else { tier='low'; label = 'due ' + (t.dateLabel || (d + 'd')); }
  const c = TIER[tier];
  const assigned = !!t.assignee;
  return Object.assign({}, t, {
    tier, label, border:c.b, badgeBg:c.bg, badgeFg:c.fg,
    hoursStr: t.loggedHours.toFixed(1),
    who: assigned ? t.assignee : 'Undetermined — no one assigned',
    whoShort: assigned ? initials(t.assignee) : 'Unassigned',
    whoColor: assigned ? '#b3a89a' : '#a8714a',
    note: t.status || (t.dateLabel ? ('Due ' + t.dateLabel) : 'No status')
  });
}
function initials(name){ return ((name||'').match(/\b\w/g)||[]).slice(0,2).join('').toUpperCase(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* derived collections used across tabs */
function buildView(){
  const all = TASKS.map(decorate).sort((a,b)=> (a.off==null?1e9:a.off) - (b.off==null?1e9:b.off));
  const overdue  = all.filter(t => t.off != null && t.off < 0);
  const dueWeek  = all.filter(t => t.off != null && t.off >= 0 && t.off <= 4);
  const todaySoon= all.filter(t => t.off != null && t.off >= 0 && t.off <= 1);
  const dueToday = all.filter(t => t.off === 0);   // strictly today — matches Karbon's "Due Today"
  const addedWk  = all.filter(t => t.addedOff != null && t.addedOff >= -6).sort((a,b)=> (a.off??1e9)-(b.off??1e9));
  const nextWk   = all.filter(t => t.off != null && t.off >= 7 && t.off <= 11);
  const hoursTotal = TASKS.reduce((s,t)=> s + t.loggedHours, 0).toFixed(1);
  const unassigned = all.filter(t => !t.assignee);
  return { all, overdue, dueWeek, todaySoon, dueToday, addedWk, nextWk, hoursTotal, unassigned };
}

/* ============================================================
   RENDER
   ============================================================ */
function setConn(s){
  CONN = s;
  const dot = document.getElementById('connDot'), txt = document.getElementById('connText');
  const hdrDot = document.getElementById('hdrDot'), hdrText = document.getElementById('hdrText');
  const live = (s === 'live' || s === 'empty');
  const map = {
    connecting:{ c:'#c79a3a', t:'Connecting to Karbon…' },
    live:      { c:'#5f7d4f', t:'Connected to Karbon · synced ' + nowTime() },
    empty:     { c:'#5f7d4f', t:'Connected to Karbon · no active tasks · ' + nowTime() },
    error:     { c:'#c14733', t:'Connection failed — check /api/tasks (showing 0 tasks)' }
  }[s] || { c:'#c79a3a', t:'' };
  dot.style.background = map.c; txt.textContent = map.t;
  hdrDot.style.background = live ? '#5f7d4f' : '#c79a3a';
  hdrText.textContent = live ? ('Synced with Karbon · ' + nowTime()) : (s === 'error' ? 'Not connected' : 'Connecting…');
}
function nowTime(){ return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }

function rowHTML(t){
  return `<div class="row" style="border-left-color:${t.border}">
    <div class="row-main">
      <div class="row-title"><span class="row-task">${esc(t.title)}</span>${t.client?`<span class="row-client">${esc(t.client)}</span>`:''}</div>
      <div class="row-note">${esc(t.note)} <span style="color:${t.whoColor}">— ${esc(t.whoShort)}</span></div>
    </div>
    <div class="row-right">
      <span class="badge" style="background:${t.badgeBg};color:${t.badgeFg}">${esc(t.label)}</span>
      <div class="row-meta mono">${t.hoursStr}h${t.dateLabel?` · due ${esc(t.dateLabel)}`:''}</div>
    </div>
  </div>`;
}
function sectionHTML(key, tag, color, items, emptyMsg){
  const open = !collapsed[key];
  const body = open ? (items.length ? items.map(rowHTML).join('') : `<div style="font-size:12.5px;color:#9a8f7f;padding:6px 0 4px;">${emptyMsg}</div>`) : '';
  return `<div class="sec" onclick="toggle('${key}')">
      <span class="sec-tag mono" style="color:${color}">${tag}</span>
      <span class="sec-count mono">${items.length}</span>
      <span class="sec-rule"></span>
      <span class="chev ${open?'':'closed'}"></span>
    </div>${body}`;
}
function cardsHTML(v){
  return `<div class="cards">
    <div class="card"><div class="card-label">Overdue</div><div class="card-val"><span class="card-num" style="color:#8f2f1f">${v.overdue.length}</span><span class="card-unit">tasks</span></div></div>
    <div class="card"><div class="card-label">Due this week</div><div class="card-val"><span class="card-num" style="color:#7d5c12">${v.dueWeek.length}</span><span class="card-unit">tasks</span></div></div>
    <div class="card"><div class="card-label">Hours logged · wk</div><div class="card-val"><span class="card-num mono" style="font-weight:600">${v.hoursTotal}</span><span class="card-unit">h</span></div></div>
  </div>`;
}

function render(){
  // tab highlight
  document.querySelectorAll('#tabs .tab').forEach(el => el.classList.toggle('active', el.dataset.tab === TAB));
  const panel = document.getElementById('panel');
  const v = buildView();

  // Empty state (connected, but no tasks)
  if (CONN === 'empty'){
    panel.innerHTML = `<div class="empty">
      <div class="empty-ico"><span class="empty-ring"></span></div>
      <div class="empty-title">No active tasks in Karbon</div>
      <div class="empty-sub">You're connected to your Karbon feed, but it returned no active assignments. New work appears here automatically on the next sync.</div>
      <button class="btn btn-primary" style="margin-top:20px;padding:9px 18px;" onclick="loadTasks()">Refresh feed</button>
    </div>`;
    return;
  }

  if (TAB === 'today'){
    panel.innerHTML = cardsHTML(v)
      + sectionHTML('tOver','Overdue','#8f2f1f', v.overdue, 'Nothing overdue. ✦')
      + sectionHTML('tSoon','Due today','#7d5c12', v.dueToday, 'Nothing due today.');
  } else if (TAB === 'week'){
    panel.innerHTML = cardsHTML(v)
      + sectionHTML('wOver','Overdue','#8f2f1f', v.overdue, 'Nothing overdue.')
      + sectionHTML('wDue','Due this week','#7d5c12', v.dueWeek, 'Nothing due in the next few days.');
  } else if (TAB === 'work'){
    panel.innerHTML = workloadHTML(v);
  } else {
    panel.innerHTML = reportHTML(v);
  }
}

/* WORKLOAD — group by assignee, % bar by relative load */
function workloadHTML(v){
  const norm = s => (s || '').trim().toLowerCase();
  // Build one bucket per colleague on the roster (in roster order), then fill
  // from this week's tasks. Colleagues with no active work still show (count 0).
  const buckets = COLLEAGUES.map(name => ({ name, init: initials(name), count:0, over:0, hours:0 }));
  const byName = {};
  buckets.forEach(b => { byName[norm(b.name)] = b; });

  v.all.forEach(t => {
    const b = byName[norm(t.assignee)];
    if (!b) return;                       // skip anyone not on the roster
    b.count++; if (t.off != null && t.off < 0) b.over++; b.hours += t.loggedHours;
  });

  const maxC = Math.max(1, ...buckets.map(m => m.count));
  buckets.sort((a,b)=> (b.over - a.over) || (b.count - a.count));
  const withWork = buckets.filter(m => m.count > 0).length;

  const rows = buckets.map(m => `<div class="wl-row">
      <div class="wl-ava">${esc(m.init)}</div>
      <div class="wl-main">
        <div class="wl-name">${esc(m.name)}</div>
        <div class="wl-bar"><div class="wl-fill" style="width:${Math.round(m.count/maxC*100)}%;background:${m.over>0?'#c14733':'#c1632f'}"></div></div>
      </div>
      <div class="wl-stat"><div class="wl-count mono">${m.count} <span style="font-size:11px;color:#9a8f7f;font-weight:400">active</span></div><div class="wl-hours">${m.hours.toFixed(1)}h logged</div></div>
      <div class="wl-over">${m.over>0?`<span class="badge" style="background:#f6e2dc;color:#8f2f1f">${m.over} overdue</span>`:''}</div>
    </div>`).join('');
  return `<div class="wl-head"><div class="wl-title">Team workload · this week</div><div class="wl-sub mono">${withWork} of ${COLLEAGUES.length} with active work</div></div>
    <div class="wl-sub" style="margin-bottom:4px">Active assignments per colleague, sorted by overdue load. Hours logged shown verbatim from Karbon.</div>${rows}`;
}

/* REPORT — Monday email preview + Send button */
function reportHTML(v){
  const repItem = (t, right) => `<div class="rep-item" style="border-left-color:${t.border}">
      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;"><span style="font-weight:600;font-size:14px">${esc(t.title)}${t.client?` <span style="color:#9a8f7f;font-weight:500">· ${esc(t.client)}</span>`:''}</span><span class="mono" style="font-size:12px;color:${t.badgeFg}">${esc(right)}</span></div>
      <div style="font-size:12.5px;margin-top:4px;line-height:1.5"><span style="color:${t.assignee?'#5f574c':'#a8714a'};font-weight:${t.assignee?'500':'700'}">${esc(t.who)}</span><span style="color:#9a8f7f"> · ${t.hoursStr}h · ${esc(t.note)}</span></div>
    </div>`;
  const repSec = (tag,color,items,rightFn,empty) => `<div class="rep-sec"><span class="sec-tag mono" style="color:${color};font-weight:700">${tag}</span><span class="sec-count mono">${items.length}</span><span class="sec-rule" style="background:#efe6d6"></span></div>`
      + (items.length ? items.map(t=>repItem(t, rightFn(t))).join('') : `<div style="font-size:12.5px;color:#9a8f7f;padding:2px 0 6px">${empty}</div>`);

  const pl = (n,s,p)=> n + ' ' + (n===1?s:(p||s+'s'));
  const mostOver = v.overdue[0];
  let summary = `The week opens with ${pl(v.overdue.length,'overdue task')} and ${pl(v.dueWeek.length,'task')} due before the week is out, with ${v.hoursTotal}h logged so far. `;
  if (mostOver) summary += `The furthest behind is ${esc(mostOver.title)}${mostOver.client?` for ${esc(mostOver.client)}`:''}, ${-mostOver.off} day${mostOver.off===-1?'':'s'} past due. `;
  summary += `${pl(v.addedWk.length,'task')} ${v.addedWk.length===1?'was':'were'} added this week, and ${pl(v.nextWk.length,'task')} ${v.nextWk.length===1?'is':'are'} already on next week's calendar.`;
  const dateStr = new Date().toLocaleDateString('en-US',{ weekday:'short', month:'short', day:'numeric' });

  return `
    <div class="rep-head">
      <div style="font-size:12.5px;color:#7c7468"><span style="font-weight:700;color:#29251f">Monday report</span> · auto-emailed to the admin every Monday 8:00 AM MT</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span class="pill mono">Next send · Mon 8:00 AM MT</span>
        <button class="btn btn-primary" id="btnSend" style="padding:7px 16px;" onclick="sendReport()">Send report now</button>
      </div>
    </div>
    <div class="email">
      <div class="email-to"><div style="font-size:13.5px;font-weight:700">Weekly schedule — ${v.overdue.length} overdue, ${v.dueWeek.length} due this week</div><div style="font-size:11.5px;color:#9a8f7f;margin-top:3px">To: Admin (you) · ${dateStr} · 8:00 AM Mountain Time</div></div>
      <div class="email-band"><div class="mono" style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.82">${dateStr} · Mountain Time</div><div style="font-size:21px;font-weight:700;margin-top:6px">All active assignments</div></div>
      <div class="email-stats">
        <div class="email-stat"><div style="font-size:24px;font-weight:700;color:#8f2f1f">${v.overdue.length}</div><div style="font-size:11px;color:#9a8f7f">Overdue</div></div>
        <div class="email-stat"><div style="font-size:24px;font-weight:700;color:#7d5c12">${v.dueWeek.length}</div><div style="font-size:11px;color:#9a8f7f">Due this week</div></div>
        <div class="email-stat"><div style="font-size:24px;font-weight:700;color:#3f5636">${v.addedWk.length}</div><div style="font-size:11px;color:#9a8f7f">Added this week</div></div>
        <div class="email-stat" style="border-right:none"><div style="font-size:24px;font-weight:700;color:#6f6657">${v.nextWk.length}</div><div style="font-size:11px;color:#9a8f7f">Due next week</div></div>
      </div>
      <div class="email-body">
        <div class="mono" style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9a8f7f;margin-bottom:8px">Summary</div>
        <p style="margin:0;font-size:13.5px;line-height:1.65;color:#4f483e;text-wrap:pretty">${summary}</p>
        ${v.unassigned.length ? `<div style="margin-top:10px;font-size:12.5px;color:#a8714a;background:#f9efe6;border:1px solid #ecd8c5;border-radius:8px;padding:8px 12px">⚠ ${pl(v.unassigned.length,'task')} currently ${v.unassigned.length===1?'has':'have'} no assignee and ${v.unassigned.length===1?'needs':'need'} to be allocated.</div>` : ''}
        ${repSec('Overdue','#8f2f1f', v.overdue, t=>`${-t.off}d overdue`, 'Nothing overdue.')}
        ${repSec('Due this week','#7d5c12', v.dueWeek, t=>`due ${t.dateLabel||''}`, 'Nothing due this week.')}
        ${repSec('Newly added this week','#3f5636', v.addedWk, t=>`added ${t.addedLabel||''}`, 'Nothing added this week.')}
        ${repSec('Due next week','#6f6657', v.nextWk, t=>`due ${t.dateLabel||''}`, 'Nothing on next week.')}
      </div>
      <div class="email-foot mono">Auto-generated from Karbon · tasks with no assignee flagged "Undetermined"</div>
    </div>`;
}

/* ============================================================

function toggle(key){ collapsed[key] = !collapsed[key]; render(); }
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab'); if (!tab) return;
  TAB = tab.dataset.tab; render();
});
(function initHeader(){
  const now = new Date();
  document.getElementById('hdrDate').textContent = now.toLocaleDateString('en-US',{ weekday:'short', month:'short', day:'numeric' });
  document.getElementById('hdrTime').textContent = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) + ' MT';
})();

render();       // paint the shell immediately (shows 0s)
loadTasks();    // then pull the live feed
</script>
